<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Enterprise Dashboard - LQTC RHRP</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar / Header -->
    <nav class="navbar custom-navbar shadow-sm sticky-top">
        <div class="container-fluid px-2 px-md-4 d-flex flex-wrap gap-2 justify-content-between align-items-center">
            
            <a class="navbar-brand d-none d-xl-flex align-items-center fw-bold me-2 me-md-4" href="#">
                <i class="bi bi-grid-1x2-fill me-2 text-primary"></i>
                LQTC Tracker
            </a>

            <!-- Sprints Architecture -->
            <div class="d-flex align-items-center flex-grow-1 flex-xl-grow-0 me-auto">
                <select id="sprintSelect" class="form-select form-select-sm bg-light fw-medium shadow-sm me-2" style="width: auto; min-width: 140px; max-width: 200px;" onchange="switchSprint(this.value)">
                    <!-- Populated by JS -->
                </select>
                <button class="btn btn-sm btn-outline-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addSprintModal" title="Add New Sprint">
                    <i class="bi bi-plus-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger shadow-sm ms-2" onclick="deleteCurrentSprint()" title="Delete Current Sprint">
                    <i class="bi bi-trash"></i>
                </button>
                <div class="dropdown ms-2">
                    <button class="btn btn-sm btn-light shadow-sm theme-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Data Tools">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul class="dropdown-menu shadow">
                        <li><a class="dropdown-item fw-medium small" href="#" onclick="exportSprint()"><i class="bi bi-download me-2 text-primary"></i>Export Sprint JSON</a></li>
                        <li><a class="dropdown-item fw-medium small" href="#" onclick="document.getElementById('importJsonFile').click()"><i class="bi bi-upload me-2 text-success"></i>Import Sprint JSON</a></li>
                    </ul>
                    <input type="file" id="importJsonFile" accept=".json" style="display: none;" onchange="importSprint(event)">
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex align-items-center gap-2">
                <!-- Desktop Active/Fixed Bug Toggles -->
                <button class="btn btn-sm btn-outline-danger shadow-sm position-relative d-none d-md-inline-block" data-bs-toggle="offcanvas" data-bs-target="#activeBugsOffcanvas">
                    <i class="bi bi-bug-fill"></i> Active Bugs
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="navActiveBugsCount" style="font-size: 0.65em;">0</span>
                </button>
                <button class="btn btn-sm btn-outline-success shadow-sm position-relative d-none d-md-inline-block" data-bs-toggle="offcanvas" data-bs-target="#fixedBugsOffcanvas">
                    <i class="bi bi-check-circle-fill"></i> Fixed Bugs
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success" id="navFixedBugsCount" style="font-size: 0.65em;">0</span>
                </button>

                <!-- Core Appends -->
                <button class="btn btn-sm btn-primary d-flex align-items-center shadow-sm ms-1" data-bs-toggle="modal" data-bs-target="#userStoryModal">
                    <i class="bi bi-journal-plus me-1"></i> <span class="d-none d-sm-inline">Add Story</span>
                </button>
                <button class="btn btn-sm btn-danger d-flex align-items-center shadow-sm" data-bs-toggle="modal" data-bs-target="#bugModal" onclick="prepareBugModal('Yet to Fix')">
                    <i class="bi bi-bug-fill me-1"></i> <span class="d-none d-sm-inline">Add Bug</span>
                </button>
                
                <div class="vr mx-1 d-none d-sm-block bg-secondary"></div>
                
                <div class="d-flex align-items-center bg-light rounded shadow-sm ps-2 pe-1" style="height: 31px; cursor: pointer;" onclick="openDeveloperModal()" title="Developer Profile">
                    <span id="navDevName" class="d-none d-md-inline small fw-bold text-secondary me-2"></span>
                    <i class="bi bi-person-fill text-primary"></i>
                </div>

                <button id="themeToggle" class="btn btn-sm btn-light rounded-circle shadow-sm theme-btn ms-1" style="width: 31px; height: 31px;" title="Toggle Dark Mode">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Bug Toggles (Visible only on small screens) -->
    <div class="container-fluid px-4 mt-3 d-md-none d-flex justify-content-between">
        <button class="btn btn-outline-danger flex-grow-1 me-2 shadow-sm" data-bs-toggle="offcanvas" data-bs-target="#activeBugsOffcanvas">
            <i class="bi bi-bug-fill"></i> Active
        </button>
        <button class="btn btn-outline-success flex-grow-1 ms-2 shadow-sm" data-bs-toggle="offcanvas" data-bs-target="#fixedBugsOffcanvas">
            <i class="bi bi-check-circle-fill"></i> Fixed
        </button>
    </div>

    <!-- Main Board -->
    <div class="container px-4 pb-4 mt-4 board-container section-full-height">
        <!-- Center/Main Column: User Stories -->
        <div class="d-flex flex-column column-wrapper pb-3 rounded shadow-sm column-stories h-100 mx-auto" style="max-width: 900px;">
            <div class="column-header d-flex justify-content-between align-items-center py-3 px-4 border-bottom border-primary theme-border">
                <h5 class="mb-0 fw-bold d-flex align-items-center text-primary">
                    <i class="bi bi-journals me-2"></i> User Stories
                    <span class="badge bg-primary ms-3 rounded-pill" id="storiesCount">0</span>
                </h5>
                <div class="d-flex gap-2 align-items-center">
                    <select id="sortStoriesSelect" class="form-select form-select-sm shadow-sm" onchange="renderAll()">
                        <option value="priority">Sort by Priority</option>
                        <option value="dateDesc">Newest</option>
                        <option value="dateAsc">Oldest</option>
                    </select>
                </div>
            </div>
            
            <!-- Story Filters -->
            <div class="px-4 py-2 filter-bar-container theme-border border-bottom w-100">
                <ul class="nav nav-pills nav-fill gap-2" id="storyTabs">
                    <li class="nav-item">
                        <button class="nav-link active fw-medium py-1 filter-btn" data-filter="Active" onclick="setStoryFilter('Active')">
                            Active <span class="badge bg-secondary text-white ms-1 rounded-pill" id="activeStoriesCount">0</span>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link fw-medium py-1 filter-btn" data-filter="Completed" onclick="setStoryFilter('Completed')">
                            Completed <span class="badge bg-secondary text-white ms-1 rounded-pill" id="completedStoriesCount">0</span>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link fw-medium py-1 filter-btn" data-filter="All" onclick="setStoryFilter('All')">
                            All
                        </button>
                    </li>
                </ul>
            </div>

            <!-- User Stories List container -->
            <div id="userStoriesList" class="flex-grow-1 card-list custom-scrollbar px-4 pt-3"></div>
        </div>
    </div>

    <!-- Right-Side Offcanvas: Fixed Bugs -->
    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="fixedBugsOffcanvas" aria-labelledby="fixedBugsLabel">
        <div class="offcanvas-header border-bottom border-success">
            <h5 class="offcanvas-title fw-bold d-flex align-items-center text-success" id="fixedBugsLabel">
                <i class="bi bi-check-circle-fill me-2"></i> Fixed Bugs
                <span class="badge bg-success ms-2 rounded-pill" id="fixedBugsCount">0</span>
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body custom-scrollbar position-relative pb-5">
            <div id="fixedBugsList" class="card-list h-100"></div>
            <!-- Floating add bug button inside offcanvas -->
            <button class="btn btn-success rounded-circle shadow-lg position-absolute bottom-0 end-0 m-4" style="width: 50px; height: 50px;" data-bs-toggle="modal" data-bs-target="#bugModal" onclick="prepareBugModal('Fixed')">
                <i class="bi bi-plus-lg fs-4"></i>
            </button>
        </div>
    </div>

    <!-- Left-Side Offcanvas: Active Bugs -->
    <div class="offcanvas offcanvas-start shadow" tabindex="-1" id="activeBugsOffcanvas" aria-labelledby="activeBugsLabel">
        <div class="offcanvas-header border-bottom border-danger">
            <h5 class="offcanvas-title fw-bold d-flex align-items-center text-danger" id="activeBugsLabel">
                <i class="bi bi-bug-fill me-2"></i> Active Bugs
                <span class="badge bg-danger ms-2 rounded-pill" id="activeBugsCount">0</span>
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body custom-scrollbar position-relative pb-5">
            <div id="activeBugsList" class="card-list h-100"></div>
            <!-- Floating add bug button inside offcanvas -->
            <button class="btn btn-danger rounded-circle shadow-lg position-absolute bottom-0 end-0 m-4" style="width: 50px; height: 50px;" data-bs-toggle="modal" data-bs-target="#bugModal" onclick="prepareBugModal('Yet to Fix')">
                <i class="bi bi-plus-lg fs-4"></i>
            </button>
        </div>
    </div>

    <!-- User Story Modal -->
    <div class="modal fade" id="userStoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="storyModalTitle">Create User Story</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="userStoryForm">
                        <input type="hidden" id="storyId">
                        <div class="row mb-3">
                            <div class="col-12 col-md-5">
                                <label class="form-label fw-medium text-muted small">Story Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-light" id="storyNumber" placeholder="e.g. US-12345" required>
                            </div>
                            <div class="col-12 col-md-7">
                                <label class="form-label fw-medium text-muted small">Story Description</label>
                                <input type="text" class="form-control bg-light" id="storyTitle" placeholder="e.g. User should be able to Edit...">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-12 col-md-5">
                                <label class="form-label fw-medium text-muted small">Release Baton</label>
                                <input type="text" class="form-control bg-light" id="storyRbNumber" placeholder="e.g. 614944">
                            </div>
                            <div class="col-12 col-md-7">
                                <label class="form-label fw-medium text-muted small">RB Description</label>
                                <input type="text" class="form-control bg-light" id="storyRbDescription" placeholder="Brief RB description...">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Priority</label>
                                <select class="form-select bg-light" id="storyPriority">
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Status</label>
                                <select class="form-select bg-light" id="storyStatus">
                                    <option value="Active">Active</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Build Num</label>
                                <input type="text" class="form-control bg-light" id="storyBuildNumber" placeholder="e.g. SCP #60">
                            </div>
                        </div>
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Dev Target</label>
                                <input type="date" class="form-control bg-light" id="storyDevDate">
                            </div>
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Rel Target</label>
                                <input type="date" class="form-control bg-light" id="storyReleaseDate">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary fw-medium px-4" onclick="saveStory()">Save Story</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bug Modal -->
    <div class="modal fade" id="bugModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="bugModalTitle">Report a Bug</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="bugForm">
                        <input type="hidden" id="bugId">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-muted small">Bug Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg bg-light" id="bugNumber" placeholder="e.g. BUGX123" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-muted small">Description <span class="text-danger">*</span></label>
                            <textarea class="form-control bg-light" id="bugDescription" rows="3" placeholder="Brief description of the issue..." required></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Status</label>
                                <select class="form-select bg-light" id="bugStatus">
                                    <option value="Yet to Fix">Yet to Fix</option>
                                    <option value="Fixed">Fixed</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label fw-medium text-muted small">Related Story</label>
                                <select class="form-select bg-light" id="bugRelatedStory">
                                    <option value="">None</option>
                                    <!-- Dynamic Population -->
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger fw-medium px-4" id="saveBugBtn" onclick="saveBug()">Save Bug</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Sprint Modal -->
    <div class="modal fade" id="addSprintModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Create Sprint</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addSprintForm">
                        <div class="mb-2">
                            <label class="form-label fw-medium text-muted small">Sprint Name</label>
                            <input type="text" class="form-control bg-light" id="newSprintName" placeholder="e.g. 2026.03.23_2026.04.09" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary fw-medium px-4" onclick="createNewSprint()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Developer Modal -->
    <div class="modal fade" id="developerModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-person-badge-fill me-2"></i>Developer Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="devModalCloseBtn"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label class="form-label fw-medium text-muted small">Your Name</label>
                        <input type="text" class="form-control bg-light" id="developerNameInput" placeholder="e.g. John Doe" required>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-primary fw-medium px-4 w-100" onclick="saveDeveloperName()">Save Profile</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generic Confirm Delete Modal -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i>Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4" id="confirmDeleteMessage">
                    Are you sure you want to delete this item?
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger fw-medium px-4" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Email Template Modal -->
    <div class="modal fade" id="emailTemplateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-envelope-check me-2"></i>QA Handoff Email Template</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-3">
                    <div class="bg-light p-3 rounded custom-scrollbar border" style="max-height: 400px; overflow-y: auto;">
                        <!-- Using styled pre to render whitespace accurately but retaining styling -->
                        <div id="emailTemplateContent" style="white-space: pre-wrap; word-break: break-word; font-family: 'Inter', sans-serif; font-size: 0.95rem; color: #333;"></div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0 justify-content-between">
                    <span class="text-success small opacity-0 transition-opacity" id="copySuccessFeedback"><i class="bi bi-check2-circle me-1"></i>Copied to clipboard!</span>
                    <div>
                        <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary fw-medium px-4 ms-2" onclick="copyEmailText()"><i class="bi bi-copy me-2"></i>Copy to Clipboard</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Application Logic -->
    <script src="script.js"></script>
</body>
</html>
